# =============================================================================
# docker-compose.yml — Local development stack
# Usage:
#   docker compose up          # build + start
#   docker compose up --build  # force rebuild
#   docker compose down        # stop
# =============================================================================

services:
  earlymind:
    build:
      context: .
      dockerfile: Dockerfile
      no_cache: false
    container_name: earlymind
    ports:
      - "8000:8000"
      - "8501:8501"
    environment:
      - EARLYMIND_DEVICE=cpu
      - EARLYMIND_CKPT_DIR=/app/checkpoints
      - EARLYMIND_LOG_LEVEL=INFO
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
    volumes:
      - ./checkpoints:/app/checkpoints:ro
      - ./datasets/processed:/app/datasets/processed:ro
      - ./src:/app/src:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
