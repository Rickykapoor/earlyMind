stages:
  eeg_preprocess:
    cmd: >-
      python -c "
      from src.data.eeg_loader import process_eeg_dataset;
      from src.config import cfg;
      process_eeg_dataset(cfg.paths.eeg_raw, cfg.paths.eeg_processed)"
    deps:
      - datasets/eeg/helsinki_neonatal
      - src/data/eeg_loader.py
      - src/config.py
    outs:
      - datasets/processed/eeg
    params:
      - params.yaml:
          - data.eeg_sample_rate
          - data.eeg_epoch_seconds
          - data.eeg_epoch_overlap

  mri_preprocess:
    cmd: >-
      python -c "
      from src.data.mri_loader import process_mri_dataset;
      from src.config import cfg;
      process_mri_dataset(cfg.paths.mri_raw, cfg.paths.mri_processed)"
    deps:
      - datasets/mri/baby_open_brains
      - src/data/mri_loader.py
      - src/config.py
    outs:
      - datasets/processed/mri
    params:
      - params.yaml:
          - data.mri_slice_size

  mri_augment:
    cmd: python scripts/balance_mri.py --skip-preprocess
    deps:
      - datasets/processed/mri
      - src/data/mri_augment.py
      - src/data/mri_loader.py
      - scripts/balance_mri.py
      - src/config.py
    outs:
      - datasets/mri/augmented
    params:
      - params.yaml:
          - augmentation.mri_target_samples
          - augmentation.mri_aug_seed
          - augmentation.mri_dq_noise_std

  hpo_preprocess:
    cmd: >-
      python -c "
      from src.data.hpo_loader import process_hpo_dataset;
      from src.config import cfg;
      process_hpo_dataset(cfg.paths.hpo_raw, cfg.paths.hpo_processed)"
    deps:
      - datasets/facial/hpo
      - src/data/hpo_loader.py
      - src/config.py
    outs:
      - datasets/processed/facial
    params:
      - params.yaml:
          - data.hpo_min_disease_freq

  train_eeg_encoder:
    cmd: python src/scripts/run_eeg_encoder.py
    deps:
      - datasets/processed/eeg
      - src/models/eeg_encoder.py
      - src/training/trainer.py
      - src/scripts/run_eeg_encoder.py
    outs:
      - checkpoints/eeg_encoder_pretrained.pt
    params:
      - params.yaml:
          - model.embed_dim
          - training.seed

  train_mri_encoder:
    cmd: python src/scripts/run_mri_encoder.py
    deps:
      - datasets/processed/mri
      - src/models/mri_encoder.py
      - src/training/trainer.py
      - src/scripts/run_mri_encoder.py
    outs:
      - checkpoints/mri_encoder_pretrained.pt

  train_hpo_encoder:
    cmd: python src/scripts/run_hpo_encoder.py
    deps:
      - datasets/processed/facial
      - src/models/hpo_encoder.py
      - src/training/trainer.py
      - src/scripts/run_hpo_encoder.py
    outs:
      - checkpoints/hpo_encoder_pretrained.pt

  train_fusion:
    cmd: python src/scripts/run_fusion.py
    deps:
      - checkpoints/eeg_encoder_pretrained.pt
      - checkpoints/mri_encoder_pretrained.pt
      - checkpoints/hpo_encoder_pretrained.pt
      - src/models/fusion_model.py
      - src/training/trainer.py
      - src/scripts/run_fusion.py
    outs:
      - checkpoints/fusion_model.pt
    params:
      - params.yaml:
          - training.epochs
          - training.lr
          - training.patience
